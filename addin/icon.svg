<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Teal background -->
  <rect width="128" height="128" rx="16" fill="#0f766e"/>

  <!-- Org-chart / hierarchy icon in white -->
  <!-- Root node -->
  <rect x="48" y="14" width="32" height="20" rx="4" fill="#fff" opacity="0.95"/>
  <!-- Root connector down -->
  <line x1="64" y1="34" x2="64" y2="48" stroke="#fff" stroke-width="3" opacity="0.8"/>

  <!-- Horizontal bar -->
  <line x1="26" y1="48" x2="102" y2="48" stroke="#fff" stroke-width="3" opacity="0.8"/>

  <!-- Left branch down -->
  <line x1="26" y1="48" x2="26" y2="58" stroke="#fff" stroke-width="3" opacity="0.8"/>
  <!-- Center branch down -->
  <line x1="64" y1="48" x2="64" y2="58" stroke="#fff" stroke-width="3" opacity="0.8"/>
  <!-- Right branch down -->
  <line x1="102" y1="48" x2="102" y2="58" stroke="#fff" stroke-width="3" opacity="0.8"/>

  <!-- Left child node -->
  <rect x="10" y="58" width="32" height="20" rx="4" fill="#fff" opacity="0.95"/>
  <!-- Center child node -->
  <rect x="48" y="58" width="32" height="20" rx="4" fill="#fff" opacity="0.95"/>
  <!-- Right child node -->
  <rect x="86" y="58" width="32" height="20" rx="4" fill="#fff" opacity="0.95"/>

  <!-- Left grandchild connector -->
  <line x1="26" y1="78" x2="26" y2="88" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <line x1="18" y1="88" x2="34" y2="88" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <line x1="18" y1="88" x2="18" y2="96" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <line x1="34" y1="88" x2="34" y2="96" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <!-- Left grandchild nodes -->
  <rect x="8" y="96" width="20" height="14" rx="3" fill="#fff" opacity="0.85"/>
  <rect x="26" y="96" width="20" height="14" rx="3" fill="#fff" opacity="0.85"/>

  <!-- Center grandchild connector -->
  <line x1="64" y1="78" x2="64" y2="88" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <rect x="54" y="88" width="20" height="14" rx="3" fill="#fff" opacity="0.85"/>

  <!-- Right grandchild connector -->
  <line x1="102" y1="78" x2="102" y2="88" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <line x1="94" y1="88" x2="110" y2="88" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <line x1="94" y1="88" x2="94" y2="96" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <line x1="110" y1="88" x2="110" y2="96" stroke="#fff" stroke-width="2.5" opacity="0.7"/>
  <rect x="84" y="96" width="20" height="14" rx="3" fill="#fff" opacity="0.85"/>
  <rect x="102" y="96" width="20" height="14" rx="3" fill="#fff" opacity="0.85"/>
</svg>
